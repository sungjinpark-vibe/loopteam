<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Life Town — Timer Running</title>
<style>
  :root{
    --primary:#FF9EC4; --primary-grad-top:#FFA9C7; --primary-grad-bottom:#FF7FAE;
    --coin-ink:#8A6104;
    --secondary:#B6A0EF; --secondary-deep:#8A7BD8;
    --reading-500:#B6A0EF; --reading-ink:#5A3FA0; --reading-tint:#EFE6F6;
    --reading-top:#E2D9F9; --reading-right:#C8B8F3;
    --text-primary:#5A4A6A; --text-secondary:#6B5C7C; --text-tertiary:#8A7A95;
    --surface-raised:#FFFFFF; --border:#EFE6F6; --border-strong:#D8C9E6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:390px;height:844px;overflow:hidden;
    font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;}
  .screen{position:relative;width:390px;height:844px;overflow:hidden;
    background:linear-gradient(180deg,#EAFAFF 0%,#E6FBEF 55%,#DFF6E6 100%);}

  /* distant, blurred village — you're still *in* the town, just focused */
  .backdrop{position:absolute;left:0;right:0;bottom:0;height:220px;filter:blur(9px);opacity:0.30;}
  .backdrop .b{position:absolute;bottom:20px;border-radius:8px 8px 0 0;}

  .topbar{position:absolute;top:24px;left:20px;right:20px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
  .cat-title{font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-0.01em;}
  .close-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.75);
    display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:15px;font-weight:700;}

  .ring-wrap{position:absolute;top:150px;left:50%;transform:translateX(-50%);width:264px;height:264px;z-index:10;}
  .ring-glow{position:absolute;inset:-14px;border-radius:50%;
    background:radial-gradient(circle, rgba(182,160,239,0.30) 0%, rgba(182,160,239,0) 70%);}
  .ring-center{position:absolute;inset:22px;border-radius:50%;background:rgba(255,253,254,0.72);
    box-shadow:0 8px 26px rgba(90,74,106,0.14);
    display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .timer-num{font-size:46px;font-weight:800;color:var(--text-primary);letter-spacing:0.01em;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum";
    text-shadow:0 2px 0 rgba(255,255,255,0.6);line-height:1;}
  .timer-cat{margin-top:8px;padding:4px 14px;border-radius:999px;background:var(--reading-tint);
    color:var(--reading-ink);font-size:13px;font-weight:800;}

  .mini-bldg{position:absolute;top:340px;left:173px;width:44px;height:44px;z-index:11;}
  .mini-bldg .f{position:absolute;}

  .counters{position:absolute;top:452px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:10;}
  .counter-pill{height:34px;padding:0 14px;border-radius:999px;display:flex;align-items:center;gap:6px;
    font-size:13px;font-weight:800;background:rgba(255,253,254,0.9);box-shadow:0 2px 8px rgba(90,74,106,0.10);}
  .counter-pill.exp{color:var(--secondary-deep);}
  .counter-pill.coin{color:var(--coin-ink);}

  .actions{position:absolute;bottom:56px;left:20px;right:20px;display:flex;gap:12px;z-index:10;}
  .btn{flex:1;height:52px;border-radius:22px;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;}
  .btn-ghost{background:rgba(255,255,255,0.6);border:2px solid var(--border-strong);color:var(--text-primary);}
  .btn-primary{background:linear-gradient(180deg,var(--primary-grad-top),var(--primary-grad-bottom));
    color:#fff;box-shadow:0 6px 18px rgba(255,127,174,0.40);}

  .caption{position:absolute;top:500px;left:0;right:0;text-align:center;font-size:12px;
    color:var(--text-tertiary);font-weight:600;z-index:10;}
</style>
</head>
<body>
<div class="screen">
  <div class="backdrop">
    <div class="b" style="left:26px;width:44px;height:70px;background:#B6A0EF;"></div>
    <div class="b" style="left:84px;width:54px;height:92px;background:#8AD3B4;"></div>
    <div class="b" style="left:154px;width:40px;height:56px;background:#FFD066;"></div>
    <div class="b" style="left:210px;width:60px;height:100px;background:#FF8FA3;"></div>
    <div class="b" style="left:284px;width:46px;height:68px;background:#FFB37A;"></div>
    <div class="b" style="left:336px;width:40px;height:58px;background:#6FD0E8;"></div>
  </div>

  <div class="topbar">
    <div class="cat-title">독서 집중</div>
    <div class="close-btn">✕</div>
  </div>

  <div class="ring-wrap">
    <div class="ring-glow"></div>
    <svg width="264" height="264" style="position:absolute;inset:0;">
      <circle cx="132" cy="132" r="114" fill="none" stroke="#EFE6F6" stroke-width="18"/>
      <circle cx="132" cy="132" r="114" fill="none" stroke="#B6A0EF" stroke-width="18"
        stroke-linecap="round" stroke-dasharray="716.3" stroke-dashoffset="537.2"
        transform="rotate(-90 132 132)"/>
    </svg>
    <div class="ring-center">
      <div class="timer-num">18:42</div>
      <div class="timer-cat">독서</div>
    </div>
  </div>

  <div class="caption">지금 하고 있어요 · 25분 목표</div>

  <!-- mid-construction preview: the same category building, growing as the session runs -->
  <div class="mini-bldg">
    <div class="f" style="left:0;top:0;width:44px;height:22px;background:#E2D9F9;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);"></div>
    <div class="f" style="left:0;top:11px;width:22px;height:33px;background:#B6A0EF;clip-path:polygon(0% 0%,100% 33.33%,100% 100%,0% 66.67%);"></div>
    <div class="f" style="left:22px;top:11px;width:22px;height:33px;background:#C8B8F3;clip-path:polygon(0% 33.33%,100% 0%,100% 66.67%,0% 100%);"></div>
  </div>

  <div class="counters">
    <div class="counter-pill exp">+1,120 EXP</div>
    <div class="counter-pill coin">🪙 +1,120</div>
  </div>

  <div class="actions">
    <div class="btn btn-ghost">일시정지</div>
    <div class="btn btn-primary">끝내기</div>
  </div>
</div>
</body>
</html>
